baseURL: "https://vtudorx.github.io/"
languageCode: "en-us"
title: "Viorel Tudor"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

params:
  author: "Viorel Tudor"
  description: "System Architect at Freshful by eMAG. Writing about AWS, experiments, trade-offs, AI-enabled business intelligence, and architecture in practice."
  keywords:
    - System architect
    - AWS
    - Go
    - PHP Symfony
    - AWS CDK
    - AI-enabled business intelligence
    - AWS Bedrock
    - Claude
    - Tableau
    - MCP
    - Domain-Driven Design
    - Architecture Decision Records
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: false

  homeInfoParams:
    Title: "Viorel Tudor"
    Content: |
      System Architect at [Freshful by eMAG](https://freshful.ro).

      This site is where I write about AWS, experiments, trade-offs, AI-enabled
      business intelligence, and architecture in practice.

      You will find what is true, why it holds up, and what you can do with it.

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/viorel-tudor"
    - name: github
      url: "https://github.com/vtudorx"
    - name: rss
      url: "/index.xml"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/vtudorx/vtudorx.github.io/edit/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
  # Notes kept from a previous edit; not Hugo config:
  # How are these skills currently deployed? only on my pc
  # Who consumes them and how? teammates and maybe ci/cd
  # Are they called via MCP? yes
  # How often do these skills evolve? weekly
  # Do you need to support multiple versions simultaneously? no
