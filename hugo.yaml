baseURL: "https://vtudorx.github.io/"
languageCode: "en-us"
title: "Viorel Tudor"
theme: "PaperMod"
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

params:
  author: "Viorel Tudor"
  description: "System Architect at Freshful by eMAG. I write about AWS, hard infrastructure decisions, and building AI tools that get useful answers out of real data."
  keywords:
    - System architect
    - AWS
    - Go
    - PHP Symfony
    - AWS CDK
    - AI-enabled business intelligence
    - AWS Bedrock
    - Claude
    - Tableau
    - MCP
    - Domain-Driven Design
    - Architecture Decision Records
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: false

  schema:
    publisherType: Person
    sameAs:
      - "https://www.linkedin.com/in/viorel-tudor"
      - "https://github.com/vtudorx"

  homeInfoParams:
    Title: "Viorel Tudor"
    Content: |
      System Architect at [Freshful by eMAG](https://freshful.ro).

      I write about AWS, hard infrastructure decisions, and building AI tools that get useful answers out of data you already have. But mostly I write to make the decision trail legible, for whoever comes next or for myself six months later when I've forgotten why we made that call.

      No grand theory. Just what worked and what broke.

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/viorel-tudor"
    - name: github
      url: "https://github.com/vtudorx"
    - name: rss
      url: "/index.xml"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/vtudorx/vtudorx.github.io/edit/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40

outputs:
  home:
    - HTML
    - RSS
    - JSON
